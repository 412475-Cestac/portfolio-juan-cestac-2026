<div class="min-h-screen" [class.bg-stone-50]="!isHomeRoute" [class.text-gray-900]="!isHomeRoute" [class.bg-black]="isHomeRoute">
  @if (!isHomeRoute) {
    <app-navbar></app-navbar>
  }

  @if (isHomeRoute) {
    <main>
      <router-outlet></router-outlet>
    </main>
  } @else {
    <main class="w-full">
      <router-outlet></router-outlet>
    </main>
  }

  @if (!isHomeRoute) {
    <app-footer></app-footer>
  }

  <app-scroll-to-top></app-scroll-to-top>
</div>
