<section class="grid grid-cols-1 gap-8 lg:grid-cols-2">
  <div class="space-y-4">
    <h1 class="text-3xl font-semibold tracking-tight sm:text-4xl">Contact</h1>
    <p class="text-gray-600">Available for collaborations, campaigns and independent projects.</p>
    <div class="space-y-2 text-sm text-gray-700">
      <p><span class="font-medium text-gray-900">Email:</span> hello@example.com</p>
      <p><span class="font-medium text-gray-900">Instagram:</span> @juan.cestac</p>
      <p><span class="font-medium text-gray-900">Location:</span> Cordoba, Argentina</p>
    </div>
  </div>

  <form class="space-y-4 rounded-xl border border-stone-200 bg-white p-5">
    <div>
      <label for="name" class="mb-1 block text-sm font-medium text-gray-700">Name</label>
      <input
        id="name"
        type="text"
        class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm outline-none transition focus:border-gray-900"
      />
    </div>

    <div>
      <label for="email" class="mb-1 block text-sm font-medium text-gray-700">Email</label>
      <input
        id="email"
        type="email"
        class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm outline-none transition focus:border-gray-900"
      />
    </div>

    <div>
      <label for="projectType" class="mb-1 block text-sm font-medium text-gray-700">Type of project</label>
      <input
        id="projectType"
        type="text"
        class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm outline-none transition focus:border-gray-900"
      />
    </div>

    <div>
      <label for="message" class="mb-1 block text-sm font-medium text-gray-700">Message</label>
      <textarea
        id="message"
        rows="5"
        class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm outline-none transition focus:border-gray-900"
      ></textarea>
    </div>

    <button type="button" class="rounded-lg bg-gray-900 px-5 py-2 text-sm font-medium text-white transition hover:bg-gray-700">
      Send
    </button>
  </form>
</section>
