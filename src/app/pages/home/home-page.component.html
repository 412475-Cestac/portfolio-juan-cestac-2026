<section class="relative min-h-screen overflow-hidden bg-black text-white">
  <img
    [src]="activeBackgroundImageUrl"
    alt=""
    class="absolute inset-0 h-full w-full object-cover transition-opacity duration-500"
    decoding="async"
    fetchpriority="high"
    aria-hidden="true"
  />
  @if (previousBackgroundImageUrl) {
    <img
      [src]="previousBackgroundImageUrl"
      alt=""
      class="absolute inset-0 h-full w-full object-cover transition-opacity duration-500"
      decoding="async"
      [class.opacity-0]="isFadingBackground"
      [class.opacity-100]="!isFadingBackground"
      aria-hidden="true"
    />
  }
  <div class="pointer-events-none absolute inset-0 bg-black/60"></div>
  <div class="pointer-events-none absolute inset-0 opacity-25" style="background-image: radial-gradient(circle at 20% 20%, #2f2f2f 0%, transparent 45%), radial-gradient(circle at 80% 60%, #1c1c1c 0%, transparent 40%);"></div>

  <div class="relative z-10 mx-auto grid min-h-screen w-full max-w-7xl grid-cols-1 gap-12 px-6 py-10 sm:px-10 lg:grid-cols-2 lg:items-center lg:px-16">
    <div class="flex flex-col items-center text-center lg:items-start lg:text-left">
      <p class="text-xl font-semibold sm:text-2xl">Te muestro lo que hago</p>

      <div class="mt-8 flex w-full max-w-sm flex-col gap-4">
        @for (link of quickLinks; track link.path) {
          <a
            [routerLink]="link.path"
            (mouseenter)="setActiveBackground(link)"
            (focus)="setActiveBackground(link)"
            (touchstart)="setActiveBackground(link)"
            class="rounded-full bg-white px-6 py-3 text-center text-sm font-bold uppercase tracking-wide text-black transition hover:bg-stone-200 sm:text-base"
          >
            {{ link.label }}
          </a>
        }
      </div>

      <div class="mt-9 flex items-center gap-5">
        <a href="https://www.instagram.com/juancestac" target="_blank" rel="noopener noreferrer" class="inline-flex text-white transition hover:text-stone-300" aria-label="Abrir Instagram de juancestac">
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor" aria-hidden="true">
            <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5a4.25 4.25 0 0 0-4.25-4.25h-8.5Zm8.9 1.8a.95.95 0 1 1 0 1.9.95.95 0 0 1 0-1.9ZM12 6.5A5.5 5.5 0 1 1 6.5 12 5.5 5.5 0 0 1 12 6.5Zm0 1.5A4 4 0 1 0 16 12a4 4 0 0 0-4-4Z" />
          </svg>
        </a>
        <a routerLink="/contact" fragment="contact-form" class="inline-flex text-white transition hover:text-stone-300" aria-label="Ir al formulario de contacto">
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor" aria-hidden="true">
            <path d="M3.25 5h17.5A1.75 1.75 0 0 1 22.5 6.75v10.5A1.75 1.75 0 0 1 20.75 19H3.25A1.75 1.75 0 0 1 1.5 17.25V6.75A1.75 1.75 0 0 1 3.25 5Zm0 1.5-.13.01L12 12.64l8.88-6.13-.13-.01H3.25ZM21 7.95l-6.93 4.78a1.9 1.9 0 0 1-2.14 0L3 7.95v9.3c0 .14.11.25.25.25h17.5c.14 0 .25-.11.25-.25v-9.3Z" />
          </svg>
        </a>
        <a href="https://wa.me/5493517696363" target="_blank" rel="noopener noreferrer" class="inline-flex text-white transition hover:text-stone-300" aria-label="Enviar WhatsApp a juancestac">
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor" aria-hidden="true">
            <path d="M12.04 2A9.9 9.9 0 0 0 2.1 11.94c0 1.75.46 3.46 1.34 4.96L2 22l5.22-1.37a9.94 9.94 0 1 0 4.82-18.63Zm0 1.67a8.27 8.27 0 0 1 7.04 12.62 8.27 8.27 0 0 1-10.95 2.66l-.36-.21-3.1.81.83-3.02-.23-.38a8.27 8.27 0 0 1 6.77-12.48Zm-3.1 3.9c-.17 0-.44.06-.67.31-.23.25-.88.86-.88 2.1s.9 2.44 1.03 2.61c.13.17 1.76 2.69 4.27 3.77.6.26 1.06.41 1.42.53.6.19 1.14.16 1.57.1.48-.07 1.48-.6 1.69-1.18.21-.58.21-1.08.15-1.18-.06-.1-.23-.17-.48-.29-.25-.13-1.48-.73-1.71-.81-.23-.08-.4-.13-.56.13-.17.25-.65.81-.79.98-.15.17-.29.19-.54.06-.25-.13-1.06-.39-2.02-1.25-.75-.67-1.25-1.49-1.4-1.74-.15-.25-.02-.39.11-.52.12-.12.25-.29.38-.44.13-.15.17-.25.25-.42.08-.17.04-.31-.02-.44-.06-.13-.56-1.35-.77-1.85-.2-.49-.41-.42-.56-.43h-.48Z" />
          </svg>
        </a>
      </div>
    </div>

    <div class="hidden items-center justify-center lg:flex">
      <p class="text-5xl font-medium text-stone-200 xl:text-7xl">juan cestac</p>
    </div>
  </div>
</section>
