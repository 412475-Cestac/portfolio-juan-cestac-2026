<section class="relative min-h-screen overflow-hidden bg-black text-white">
  <img
    src="assets/images/home/shows-night.jpg"
    alt=""
    class="absolute inset-0 h-full w-full object-cover"
    aria-hidden="true"
  />
  <video
    class="absolute inset-0 h-full w-full object-cover"
    [src]="activeVideoUrl"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    aria-hidden="true"
  ></video>
  <div class="pointer-events-none absolute inset-0 bg-black/60"></div>
  <div class="pointer-events-none absolute inset-0 opacity-25" style="background-image: radial-gradient(circle at 20% 20%, #2f2f2f 0%, transparent 45%), radial-gradient(circle at 80% 60%, #1c1c1c 0%, transparent 40%);"></div>

  <div class="relative z-10 mx-auto grid min-h-screen w-full max-w-7xl grid-cols-1 gap-12 px-6 py-10 sm:px-10 lg:grid-cols-2 lg:items-center lg:px-16">
    <div class="flex flex-col items-center text-center lg:items-start lg:text-left">
      <p class="text-3xl tracking-wide sm:text-4xl">★ ° ☆ ✦ ○ ★ + ✧ ✶ •</p>
      <p class="mt-4 text-xl sm:text-2xl">Bienvenidos a mi mundo</p>

      <div class="mt-8 flex w-full max-w-sm flex-col gap-4">
        <a
          *ngFor="let link of quickLinks"
          [routerLink]="link.path"
          (mouseenter)="setActiveVideo(link.videoUrl)"
          (focus)="setActiveVideo(link.videoUrl)"
          (touchstart)="setActiveVideo(link.videoUrl)"
          class="rounded-full bg-white px-6 py-3 text-center text-sm font-semibold tracking-wide text-black transition hover:bg-stone-200 sm:text-base"
        >
          {{ link.label }}
        </a>
      </div>

      <div class="mt-9 flex items-center gap-5">
        <a href="https://instagram.com" target="_blank" rel="noreferrer" class="text-white transition hover:text-stone-300" aria-label="Instagram">
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor" aria-hidden="true">
            <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5a4.25 4.25 0 0 0-4.25-4.25h-8.5Zm8.9 1.8a.95.95 0 1 1 0 1.9.95.95 0 0 1 0-1.9ZM12 6.5A5.5 5.5 0 1 1 6.5 12 5.5 5.5 0 0 1 12 6.5Zm0 1.5A4 4 0 1 0 16 12a4 4 0 0 0-4-4Z" />
          </svg>
        </a>
        <a href="mailto:hello@example.com" class="text-white transition hover:text-stone-300" aria-label="Email">
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor" aria-hidden="true">
            <path d="M3.25 5h17.5A1.75 1.75 0 0 1 22.5 6.75v10.5A1.75 1.75 0 0 1 20.75 19H3.25A1.75 1.75 0 0 1 1.5 17.25V6.75A1.75 1.75 0 0 1 3.25 5Zm0 1.5-.13.01L12 12.64l8.88-6.13-.13-.01H3.25ZM21 7.95l-6.93 4.78a1.9 1.9 0 0 1-2.14 0L3 7.95v9.3c0 .14.11.25.25.25h17.5c.14 0 .25-.11.25-.25v-9.3Z" />
          </svg>
        </a>
        <a href="https://wa.me/5490000000000" target="_blank" rel="noreferrer" class="text-white transition hover:text-stone-300" aria-label="WhatsApp">
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor" aria-hidden="true">
            <path d="M12.03 2a9.9 9.9 0 0 0-8.57 14.85L2 22l5.29-1.39A9.97 9.97 0 1 0 12.03 2Zm0 18.2a8.25 8.25 0 0 1-4.2-1.15l-.3-.17-3.14.82.84-3.06-.2-.31A8.4 8.4 0 1 1 12.03 20.2Zm4.6-6.2c-.26-.13-1.56-.77-1.8-.86-.24-.1-.42-.13-.6.13s-.69.86-.85 1.04c-.16.18-.31.2-.58.07-.26-.13-1.11-.4-2.1-1.28-.78-.69-1.3-1.55-1.45-1.81-.15-.26-.02-.4.11-.54.12-.12.27-.31.4-.46.13-.15.18-.26.27-.44.09-.18.04-.33-.02-.46-.07-.13-.6-1.44-.82-1.97-.22-.53-.44-.46-.6-.47h-.51c-.18 0-.46.07-.7.33-.24.26-.92.9-.92 2.2 0 1.3.94 2.55 1.07 2.72.13.18 1.86 2.84 4.5 3.98.63.27 1.13.43 1.51.55.63.2 1.2.17 1.65.11.5-.08 1.56-.64 1.78-1.27.22-.62.22-1.16.15-1.27-.07-.11-.24-.18-.5-.31Z" />
          </svg>
        </a>
      </div>
    </div>

    <div class="hidden items-center justify-center lg:flex">
      <p class="text-5xl font-light tracking-tight text-stone-200 xl:text-7xl">juancestac</p>
    </div>
  </div>
</section>
