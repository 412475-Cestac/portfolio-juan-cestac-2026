<section class="relative min-h-screen overflow-hidden bg-[linear-gradient(135deg,_rgba(255,255,255,0.85)_0%,_transparent_32%),linear-gradient(180deg,_#fafafa_0%,_#e7e5e4_55%,_#d4d4d8_100%)] px-4 py-16 text-zinc-950 sm:px-6 lg:px-10 lg:py-24">
  <div class="pointer-events-none absolute inset-0 bg-[linear-gradient(90deg,_rgba(24,24,27,0.05)_1px,_transparent_1px),linear-gradient(180deg,_rgba(24,24,27,0.04)_1px,_transparent_1px)] bg-[size:84px_84px]"></div>
  <div class="relative mx-auto max-w-screen-2xl">
    <header class="mb-12 max-w-3xl border-b border-zinc-900/10 pb-10 sm:mb-16">
      <p class="text-xs font-medium uppercase tracking-[0.2em] text-zinc-500">Espacios y luz</p>
      <h1 class="mt-4 text-5xl font-semibold sm:text-6xl lg:text-7xl">Architecture & Interiors</h1>
      <p class="mt-5 max-w-2xl text-base leading-relaxed text-zinc-600 sm:text-lg">
        Fotografía de arquitectura e interiores enfocada en espacios, luz y composición.
      </p>
    </header>

    <div class="grid grid-cols-1 gap-8 lg:grid-cols-2 lg:gap-10 xl:gap-12">
      @for (group of groups; track group.id) {
        <app-group-card [group]="group"></app-group-card>
      }
    </div>
  </div>
</section>
