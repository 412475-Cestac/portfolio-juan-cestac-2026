<a
  [routerLink]="['/', group.sectionSlug, group.slug]"
  class="group relative flex min-h-[30rem] overflow-hidden rounded-3xl bg-gray-950 text-white transition-all duration-500 ease-out hover:-translate-y-1 sm:min-h-[34rem] lg:min-h-[38rem]"
  [class.lg:col-span-2]="featured"
  [class.lg:min-h-[46rem]]="featured"
>
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(255,255,255,0.08),_transparent_42%)]"></div>
  <img
    *ngIf="group.coverType === 'image'"
    [src]="group.coverImage"
    [alt]="group.title"
    class="absolute inset-0 h-full w-full object-contain p-3 transition-transform duration-700 ease-out group-hover:scale-[1.015] sm:p-4"
  />
  <video
    *ngIf="group.coverType === 'video'"
    [src]="group.coverImage"
    muted
    playsinline
    preload="metadata"
    class="absolute inset-0 h-full w-full object-contain p-3 transition-transform duration-700 ease-out group-hover:scale-[1.015] sm:p-4"
  ></video>
  <div class="absolute inset-0 bg-black/10 transition-colors duration-500 ease-out md:bg-black/0 md:group-hover:bg-black/48"></div>

  <div class="relative m-auto max-w-md translate-y-0 px-6 text-center opacity-100 transition-all duration-500 ease-out md:translate-y-5 md:opacity-0 md:group-hover:translate-y-0 md:group-hover:opacity-100">
    <h2 class="text-3xl font-semibold uppercase tracking-tight sm:text-4xl">{{ group.title }}</h2>
    <p *ngIf="group.year" class="mt-3 text-sm font-medium tracking-[0.25em] text-white/80">{{ group.year }}</p>
    <p *ngIf="group.description && featured" class="mt-4 text-sm leading-relaxed text-white/75">{{ group.description }}</p>
  </div>
</a>
