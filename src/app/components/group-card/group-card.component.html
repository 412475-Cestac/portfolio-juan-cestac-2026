<a
  [routerLink]="['/', group.sectionSlug, group.slug]"
  class="group relative flex min-h-[30rem] overflow-hidden rounded-[1.75rem] text-white transition-transform duration-500 ease-out hover:-translate-y-1 sm:min-h-[34rem] lg:min-h-[38rem]"
  [ngClass]="dark ? 'bg-slate-950 ring-1 ring-white/10 shadow-[0_30px_100px_rgba(0,0,0,0.32)]' : 'bg-white ring-1 ring-black/10 shadow-[0_24px_80px_rgba(23,23,23,0.08)]'"
>
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(255,255,255,0.08),_transparent_42%)]" [class.opacity-40]="!dark"></div>
  @if (group.coverType === 'image') {
    <img
      [src]="group.coverImage"
      [alt]="group.title"
      loading="lazy"
      decoding="async"
      class="absolute inset-0 h-full w-full object-contain p-3 transition-transform duration-700 ease-out group-hover:scale-[1.015] sm:p-4"
    />
  }
  @if (group.coverType === 'video') {
    <video
      [src]="group.coverImage"
      muted
      playsinline
    preload="none"
      class="absolute inset-0 h-full w-full object-contain p-3 transition-transform duration-700 ease-out group-hover:scale-[1.015] sm:p-4"
    ></video>
  }
  <div class="absolute inset-0 bg-black/15 transition-colors duration-500 ease-out md:bg-black/0 md:group-hover:bg-black/45"></div>

  <div class="relative m-auto max-w-md translate-y-0 px-6 text-center opacity-100 transition-[opacity,transform] duration-500 ease-out md:translate-y-5 md:opacity-0 md:group-hover:translate-y-0 md:group-hover:opacity-100">
    <h2 class="text-3xl font-medium sm:text-4xl">{{ group.title }}</h2>
    @if (group.year) {
      <p class="mt-3 text-sm font-medium text-white/80">{{ group.year }}</p>
    }
    @if (group.description) {
      <p class="mt-4 text-sm leading-relaxed text-white/75 line-clamp-2">{{ group.description }}</p>
    }
  </div>
</a>
