<article
  class="group overflow-hidden rounded-2xl"
  [class.cursor-zoom-in]="editorial"
  [class.border]="!editorial"
  [class.border-gray-800]="dark && !editorial"
  [class.border-stone-200]="!dark && !editorial"
  [class.lg:col-span-2]="featured"
  (click)="itemSelected.emit(item)"
  (keydown.enter)="itemSelected.emit(item)"
  tabindex="0"
>
  @if (item.type === 'image') {
    <img
      [src]="item.src"
      [alt]="item.title"
      loading="lazy"
      decoding="async"
      class="w-full transition duration-500 group-hover:scale-[1.01]"
      [class.h-auto]="editorial"
      [class.object-contain]="editorial"
      [class.object-cover]="!editorial"
      [class.h-72]="!large && !editorial"
      [class.sm:h-80]="!large && !editorial"
      [class.h-[30rem]]="large && !editorial"
    />
  }
  @if (item.type === 'video') {
    <div
      class="relative overflow-hidden bg-black"
      [class.h-auto]="editorial"
      [class.h-72]="!large && !editorial"
      [class.sm:h-80]="!large && !editorial"
      [class.h-[30rem]]="large && !editorial"
    >
      <img
        [src]="item.poster"
        [alt]="item.title"
        loading="lazy"
        decoding="async"
        class="w-full transition duration-500 group-hover:scale-[1.01]"
        [class.h-auto]="editorial"
        [class.h-full]="!editorial"
        [class.object-contain]="editorial"
        [class.object-cover]="!editorial"
      />
      <div class="pointer-events-none absolute inset-0 flex items-center justify-center bg-black/15 transition-colors duration-300 group-hover:bg-black/30">
        <span class="flex h-14 w-14 items-center justify-center rounded-full bg-white/90 text-lg text-black shadow-[0_12px_40px_rgba(0,0,0,0.35)]">
          ▶
        </span>
      </div>
    </div>
  }
  @if (!editorial) {
  <div class="p-3" [class.bg-gray-950]="dark" [class.bg-white]="!dark">
    <h3 class="text-sm font-medium" [class.text-gray-200]="dark" [class.text-gray-800]="!dark">{{ item.title }}</h3>
    @if (item.description) {
      <p class="mt-1 text-xs" [class.text-gray-400]="dark" [class.text-gray-500]="!dark">
        {{ item.description }}
      </p>
    }
  </div>
  }
</article>
