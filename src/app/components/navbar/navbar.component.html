<header class="sticky top-0 z-30 border-b border-stone-200 bg-stone-50/95 backdrop-blur">
  <nav class="mx-auto flex w-full max-w-7xl flex-col gap-3 px-4 py-4 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
    <a routerLink="/" class="text-lg font-medium text-gray-900">juan cestac</a>

    <ul class="flex flex-wrap gap-2 text-sm text-gray-700">
      <li *ngFor="let link of links">
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-gray-900 text-white"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="rounded-full px-3 py-1.5 transition hover:bg-gray-200"
        >
          {{ link.label }}
        </a>
      </li>
    </ul>
  </nav>
</header>
